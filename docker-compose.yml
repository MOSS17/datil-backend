services:
  postgres:
    image: postgres:16-alpine
    container_name: datil-postgres
    environment:
      POSTGRES_DB: datil
      POSTGRES_USER: datil
      POSTGRES_PASSWORD: datil
    ports:
      - "5432:5432"
    volumes:
      - datil_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datil -d datil"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  datil_pgdata:
